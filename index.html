<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark - For your loved ones</title>
</head>
<style>
    body {
        background-color: #ffffff;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
    }

    .di {
        display: block;
        position: fixed;
        top: 0;
        right: 0;

        width: 300px;
    }

    .dix {
        display: block;
        position: fixed;
        top: 0;
        left: 0;

        width: 300px;
    }
@font-face {    font-family: 'CustomFont';
    src: url('Provicali.otf') format('truetype');
}
    .h1 {
        font-family: 'CustomFont', Arial, sans-serif;
        color: black;
        font-size: 200px;
        font-weight: 200;
        margin-top: 30px;
        letter-spacing: 2px;
        text-align: center;
    }

    @font-face {
        font-family: 'cursivexd';
        src: url(Antigritas.ttf) format('truetype');
    }
    .brx {
        font-size: 25px;
        color: #0048ffb7;
        margin-top: 0px;

        font-family: 'cursivexd', Arial, Helvetica, sans-serif;
    }

    .header {

        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
    }

    .logo {
       width: 200px;
            display: block;
        position: fixed;
        top: 0;
        align-items: center;
        justify-content: center;

    }
    .logo-container {
        justify-content: center;
        display: flex;
        position: fixed;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        background-color: yellowgreen;
        color: #555555;
    }

    .hero {
        display: flex;
        flex-direction: column;
        margin-top: 240px;
        line-height: 0;
        align-items: center;
        justify-content: center;
        position: relative;
    }

    .container {
        width: 500px;
        margin: 40px auto 0;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        border: none;
        border-radius: 20px;
        backdrop-filter: blur(10px);
    }



    .text {
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        padding: 14px 16px;
        border: 3px solid #ff0000;
        border-radius: 10px;
        outline: none;
        font-size: 22px;
        transition: border-color 0.2s ease;
    }

    .text:focus {
        border-color: #ff0000;
    }

.button {
  cursor: pointer;
  font-size: large;
  font-family: inherit;
  font-weight: bold;
  color: #0011ff;
  background-color: #f8f8fd;
  padding: 0.8em 2.2em;
 align-items: center;
 text-align: center;
  border-radius: 50em;
  border: 6px solid #8b93f8;
  box-shadow: 0px 8px #1f35ff;
}
.button:active {
  position: relative;
  top: 8px;
  border: 6px solid #646fff;
  box-shadow: 0px 0px;
}
.button:hover {
  background-color: #e0e0f8;
  transform: translateY(-2px);
}


</style>
<div>
<header class="header">
    <div class="logo-container">
<img src="https://cdn.zidhuxd.com/zidhuxd-logo-black.svg" alt="Zidhuxd Logo" class="logo">
</div>
</header>
<div class="hero">
    <img src="di.jpeg" alt="diamond logo" class="di">
    <img src="di.jpeg" alt="diamond logo" class="dix">

    <h1 class="h1">Spark</h1>
    <br>
        <span class="brx">For your loved ones</span>

</div>
<div class="container">
    <input type="text" placeholder="Enter your name!" class="text">
    <input type="text" placeholder="Enter your girl name!" class="text">


</div>
<div style="display: flex; justify-content: center; margin-top: 10px;">
    <button class="button">Create your Spark</button>

</body>
</html>
